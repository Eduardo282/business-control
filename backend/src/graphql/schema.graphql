scalar DateTime

type Role {
  id: ID!
  name: String!
}

type User {
  id: ID!
  full_name: String!

  email: String!
  telefono: String
  role: Role
}

type AuthPayload {
  token: String!
  user: User!
}

type Client {
  id: ID!
  business_name: String!
  rfc: String
  email1: String
  email2: String
  celular: String
  telefono: String
  codigo_postal: String
  ciudad: String
  address: String
  contacts: [Contact!]!
}

type Contact {
  id: ID!
  client_id: ID!
  full_name: String!
  email: String
  phone: String
  position_title: String
  has_portal_access: Boolean
  is_active: Boolean
  active_services: [ContactProduct!]
}

type ContactProduct {
  id: ID!
  contact_id: ID
  contact: Contact
  client: Client
  product: Product!
  license_key: String
  start_date: String
  expiration_date: String
  status: String!
}

type LoginContactPayload {
  token: String!
  contact: Contact!
}

input RegisterUserInput {
  full_name: String!
  email: String!
  telefono: String!
  password: String!
  role_name: String! # ADMIN | VENTAS | SOPORTE
}

input LoginInput {
  email: String!
  password: String!
  full_name: String
}

input CreateClientInput {
  business_name: String!
  rfc: String
  email1: String
  email2: String
  celular: String
  telefono: String
  codigo_postal: String
  ciudad: String
}

input CreateContactInput {
  client_id: ID!
  full_name: String!
  email: String
  phone: String
  position_title: String
}

input UpdateClientInput {
  business_name: String
  rfc: String
  email1: String
  email2: String
  celular: String
  telefono: String
  codigo_postal: String
  ciudad: String
}

input UpdateContactInput {
  full_name: String
  email: String
  phone: String
  position_title: String
  has_portal_access: Boolean
  portal_password: String
}

type SendEmailResponse {
  success: Boolean!
  message: String
}

type FormDraft {
  id: ID!
  form_key: String!
  scope_key: String!
  data_json: String!
  updated_at: DateTime!
}

input UpsertFormDraftInput {
  form_key: String!
  scope_key: String
  data_json: String!
}

type ProductCategory {
  id: ID!
  name: String!
  product_type: String
}

type Query {
  me: User
  roles: [Role!]!
  productCategories: [ProductCategory!]!
  formDraft(form_key: String!, scope_key: String): FormDraft

  clients(limit: Int, offset: Int): [Client!]!
  client(id: ID!): Client
  searchClients(q: String!): [Client!]!
  contactsByClient(client_id: ID!): [Contact!]!
  contact(id: ID!): Contact

  products(client_id: ID, limit: Int, offset: Int): [Product!]!
  portalProducts: [PortalProduct!]!
  product(id: ID!): Product
  searchProducts(q: String!, client_id: ID): [Product!]!

  policies: [ContactProduct!]!

  quotes(limit: Int, offset: Int): [Quote!]!
  quote(id: ID!): Quote
  quotesByClient(client_id: ID!): [Quote!]!
  pendingQuoteRequestsCount: Int!
  unreadQuoteRequests: [Quote!]!
}

input CreateContactProductInput {
  contact_id: ID!
  product_id: ID!
  license_key: String
  start_date: String!
  expiration_date: String!
  status: String
}

type Mutation {
  verifyMasterPassword(password: String!): Boolean!
  createContactProduct(input: CreateContactProductInput!): ContactProduct!
  deleteContactProduct(id: ID!): Boolean!
  updateContactProductDates(
    id: ID!
    start_date: String
    expiration_date: String
    status: String
    license_key: String
  ): ContactProduct!

  sendQuoteEmail(
    quote_id: ID!
    contact_email: String!
    message: String!
    pdf_base64: String
  ): SendEmailResponse!
  toggleQuotePortal(id: ID!, access: Boolean!, contact_id: ID): Boolean!
  loginContact(email: String!, password: String!): LoginContactPayload!
  registerUser(input: RegisterUserInput!): User!
  login(input: LoginInput!): AuthPayload!

  createClient(input: CreateClientInput!): Client!
  bulkCreateClients(inputs: [CreateClientInput!]!): [Client!]!
  updateClient(id: ID!, input: UpdateClientInput!): Client!
  deleteClient(id: ID!): Boolean!

  createContact(input: CreateContactInput!): Contact!
  bulkCreateContacts(inputs: [CreateContactInput!]!): [Contact!]!
  updateContact(id: ID!, input: UpdateContactInput!): Contact!
  deleteContact(id: ID!): Boolean!

  createProduct(input: CreateProductInput!): Product!
  updateProduct(id: ID!, input: UpdateProductInput!): Product!
  deleteProduct(id: ID!): Boolean!
  updateProductPrice(id: ID!, price: Float!): Product!
  clearProductPriceHistory(product_id: ID!): Boolean!

  createQuote(input: CreateQuoteInput!): Quote!
  resolveQuoteRequest(requestId: ID!, input: CreateQuoteInput!): Quote!
  registerQuote(id: ID!): Quote!
  deleteQuote(id: ID!): Boolean!
  markQuoteNotificationRead(id: ID!): Boolean!

  createCategory(name: String!): ProductCategory!
  assignCategoryType(name: String!, product_type: String!): ProductCategory!
  deleteCategory(id: ID!): Boolean!

  createRole(name: String!): Role!
  deleteRole(id: ID!): Boolean!

  requestQuote(input: RequestQuoteInput!): Quote!
  deletePortalQuote(id: ID!): Boolean!
  updatePortalQuoteRequest(id: ID!, input: RequestQuoteInput!): Quote!
  rejectPortalQuote(id: ID!): Boolean!
  rejectQuote(id: ID!): Boolean!
  updateQuoteStatus(id: ID!, status: String!): Quote!

  changePortalPassword(
    contactId: ID!
    currentPassword: String!
    newPassword: String!
  ): Boolean!
  requestPortalPasswordReset(email: String!): Boolean!
  resetPortalPassword(token: String!, newPassword: String!): Boolean!

  upsertFormDraft(input: UpsertFormDraftInput!): FormDraft!
  deleteFormDraft(form_key: String!, scope_key: String): Boolean!
}

type PortalProduct {
  id: ID!
  folio: String
  name: String!
  category: String!
  product_type: String
  description: String
}

input RequestQuoteInput {
  items: [QuoteItemInput!]!
}

type Product {
  id: ID!
  folio: String
  client_id: ID
  client: Client
  name: String!
  category: String!
  product_type: String
  current_price: Float!
  users_count: Int
  description: String
  update_version: Int
  created_at: DateTime
  updated_at: DateTime
  price_history: [PriceHistory!]!
  update_history: [ProductUpdateHistory!]!
}

type PriceHistory {
  id: ID!
  price: Float!
  changed_at: DateTime!
}

type ProductUpdateHistory {
  id: ID!
  product_id: ID!
  update_version: Int!
  change_type: String
  summary: String
  changed_at: DateTime!
}

input CreateProductInput {
  name: String!
  category: String!
  price: Float!
  users_count: Int
  description: String
  client_id: ID
  product_type: String
}

input UpdateProductInput {
  name: String
  category: String
  users_count: Int
  description: String
}

type Quote {
  id: ID!
  folio: String
  client: Client
  user: User
  contact: Contact
  created_at: DateTime!
  total: Float!
  status: String!
  is_registered: Boolean!
  registered_at: DateTime
  notes: String
  is_sent_to_client_portal: Boolean
  notification_read: Boolean
  items: [QuoteItem!]!
}

type QuoteItem {
  id: ID!
  product: Product
  quantity: Int!
  base_unit_price: Float
  unit_price: Float!
  discount: Float
  total: Float!
}

input CreateQuoteInput {
  client_id: ID!
  contact_id: ID
  items: [QuoteItemInput!]!
  notes: String
  folio: String
}

input QuoteItemInput {
  product_id: ID!
  quantity: Int!
  unit_price: Float
  discount: Float
}
