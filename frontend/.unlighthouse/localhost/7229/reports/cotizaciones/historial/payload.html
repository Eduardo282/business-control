  color: #9ca3af; /* 2 */
}

  opacity: 1; /* 1 */

/*

*/

/*

}

/*
1. Make replaced elements `display: block` by default. (https://github.com/mozdevs/cssremedy/issues/14)
2. Add `vertical-align: middle` to align replaced elements more sensibly by default. (https://github.com/jensimmons/cssremedy/issues/14#issuecomment-634934210)

img,
svg,
video,
canvas,
audio,
iframe,
embed,
object {
  display: block; /* 1 */
  vertical-align: middle; /* 2 */
}

:root {
  color-scheme: light;
  --scrollbar-track: transparent;
  --scrollbar-thumb: rgba(34, 119, 180, 0.45);
  --scrollbar-thumb-hover: #2277b4;
  --scrollbar-corner: transparent;
}

.dark {
  color-scheme: dark;
  --scrollbar-track: transparent;
  --scrollbar-thumb: rgba(148, 163, 184, 0.4);
  --scrollbar-thumb-hover: #60a5fa;
  --scrollbar-corner: transparent;
}

body {
  background-color: white;
  background-size: cover;
  background-attachment: fixed;
  background-position: center;
}

/* Barra de desplazamiento personalizada */
* {
  scrollbar-width: thin;
  scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
}

*::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}

*::-webkit-scrollbar-track {
  background: var(--scrollbar-track);
  border-radius: 9999px;
}

*::-webkit-scrollbar-thumb {
  background: var(--scrollbar-thumb);
  border-radius: 9999px;
  border: 2px solid transparent;
  background-clip: padding-box;
}

*::-webkit-scrollbar-thumb:hover {
  background: var(--scrollbar-thumb-hover);
}

*::-webkit-scrollbar-corner {
  background: var(--scrollbar-corner);
}

@keyframes glassFlash {
  0% {
    opacity: 0;
    transform: translateX(-180%) rotate(12deg);
  }
  15% {
    opacity: 0.8;
  }
  85% {
    opacity: 0.15;
    transform: translateX(260%) rotate(12deg);
  }
  100% {
    opacity: 0;
    transform: translateX(260%) rotate(12deg);
  }
}

/* Utilidades de animación */
.animate-delay-100 {
  animation-delay: 100ms;
}
.animate-delay-200 {
  animation-delay: 200ms;
}
.animate-delay-300 {
  animation-delay: 300ms;
}
.animate-delay-500 {
  animation-delay: 500ms;
}

/* Price history calendar theme */
.price-history-datepicker-popper {
  z-index: 1200 !important;
}

.price-history-datepicker-calendar.react-datepicker {
  border: 1px solid #d8e3f2 !important;
  border-radius: 14px !important;
  overflow: hidden;
  box-shadow: 0 18px 38px rgba(26, 43, 76, 0.18) !important;
  background: #f8fbff !important;
  font-family: inherit;
}

.price-history-datepicker-calendar .react-datepicker__header {
  background: linear-gradient(180deg, #1a2b4c 0%, #244168 100%) !important;
  border-bottom: 1px solid #2f4f7d !important;
}

.price-history-datepicker-calendar .react-datepicker__current-month,
.price-history-datepicker-calendar .react-datepicker__day-name,
.price-history-datepicker-calendar .react-datepicker__navigation-icon::before {
  color: #f3f7ff !important;
}

.price-history-datepicker-calendar .react-datepicker__day,
.price-history-datepicker-calendar .react-datepicker__time-name {
  color: #1f2a3d !important;
  border-radius: 8px;
}

.price-history-datepicker-calendar .react-datepicker__day:hover {
  background: #e6f0fb !important;
  color: #1a2b4c !important;
}

.price-history-datepicker-calendar .react-datepicker__day--selected,
.price-history-datepicker-calendar .react-datepicker__day--keyboard-selected {
  background: #2277b4 !important;
  color: #ffffff !important;
}

.price-history-datepicker-calendar .react-datepicker__day--today {
  border: 1px solid #2277b4;
  font-weight: 700;
}

/* Product detail: remove native black number spinner to use custom stepper */
#price-update-input::-webkit-outer-spin-button,
#price-update-input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

#price-update-input {
  -moz-appearance: textfield;
}

/* RegistrarProducts: hide native number spinner, custom stepper is rendered in JSX */

#register-users-input::-webkit-outer-spin-button,

  margin: 0;
}

#register-price-input,
#register-users-input {
  -moz-appearance: textfield;
  -webkit-appearance: textfield;
